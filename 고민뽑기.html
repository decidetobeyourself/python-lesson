<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 고민 뽑기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF2D2D;
    --red-dark: #C0001A;
    --yellow: #FFD600;
    --dark: #0A0A0A;
    --panel: #111111;
    --panel2: #1A1A1A;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #666;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .machine {
    width: min(520px, 96vw);
    position: relative;
  }

  /* top label */
  .top-label {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }
  .top-label h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    letter-spacing: 4px;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(255,214,0,0.6), 0 0 40px rgba(255,214,0,0.3);
    animation: flicker 4s infinite;
  }
  .top-label p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  @keyframes flicker {
    0%,96%,100% { opacity: 1; }
    97% { opacity: 0.6; }
    98% { opacity: 1; }
    99% { opacity: 0.4; }
  }

  /* slot machine body */
  .slot-body {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px 28px;
    position: relative;
    box-shadow:
      0 0 0 1px #000,
      0 20px 60px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* slot window */
  .slot-window {
    background: #000;
    border: 2px solid #222;
    border-radius: 8px;
    height: 120px;
    overflow: hidden;
    position: relative;
    margin-bottom: 28px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 0 0 1px #333;
  }

  /* top/bottom fade */
  .slot-window::before,
  .slot-window::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 36px;
    z-index: 10;
    pointer-events: none;
  }
  .slot-window::before {
    top: 0;
    background: linear-gradient(to bottom, #000, transparent);
  }
  .slot-window::after {
    bottom: 0;
    background: linear-gradient(to top, #000, transparent);
  }

  /* center line */
  .center-line {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 46px;
    transform: translateY(-50%);
    border-top: 1px solid rgba(255,214,0,0.3);
    border-bottom: 1px solid rgba(255,214,0,0.3);
    background: rgba(255,214,0,0.03);
    z-index: 5;
    pointer-events: none;
  }

  .reel {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: none;
    will-change: transform;
  }

  .reel-item {
    height: 46px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    font-size: 15px;
    font-weight: 700;
    color: #888;
    flex-shrink: 0;
    text-align: center;
    line-height: 1.25;
    transition: color 0.2s;
  }
  .reel-item.center {
    color: var(--yellow);
    text-shadow: 0 0 12px rgba(255,214,0,0.7);
    font-size: 16px;
  }

  /* result display */
  .result-area {
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }

  .result-badge {
    display: none;
    background: var(--panel2);
    border: 1.5px solid var(--red);
    border-radius: 10px;
    padding: 14px 24px;
    text-align: center;
    box-shadow: 0 0 20px rgba(255,45,45,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards;
    max-width: 100%;
  }
  .result-badge .result-num {
    font-size: 11px;
    color: var(--red);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .result-badge .result-text {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(16px, 4vw, 22px);
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.3;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* spin button */
  .spin-btn {
    width: 100%;
    height: 62px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 4px 0 var(--red-dark),
      0 8px 20px rgba(255,45,45,0.4);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shine 2.5s infinite;
  }
  @keyframes shine {
    0% { left: -100%; }
    40%,100% { left: 200%; }
  }
  .spin-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 var(--red-dark), 0 10px 28px rgba(255,45,45,0.5); }
  .spin-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--red-dark), 0 4px 12px rgba(255,45,45,0.3); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* particles */
  .particle {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 1000;
  }

  /* bottom hint */
  .hint {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    color: #333;
    letter-spacing: 1px;
  }

  /* tension bars — left and right vertical accents */
  .slot-body::before, .slot-body::after {
    content: '';
    position: absolute;
    top: 20px; bottom: 20px;
    width: 3px;
    background: linear-gradient(to bottom, transparent, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 2px;
  }
  .slot-body::before { left: -8px; }
  .slot-body::after { right: -8px; }
  .slot-body.spinning::before,
  .slot-body.spinning::after { opacity: 1; animation: pulseBar 0.4s ease infinite alternate; }

  @keyframes pulseBar {
    from { opacity: 0.4; }
    to { opacity: 1; box-shadow: 0 0 12px var(--red); }
  }

  /* screen shake */
  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0); }
    10% { transform: translate(-3px,1px) rotate(-0.3deg); }
    20% { transform: translate(3px,-1px) rotate(0.3deg); }
    30% { transform: translate(-2px,2px) rotate(-0.2deg); }
    40% { transform: translate(2px,-2px) rotate(0.2deg); }
    50% { transform: translate(-1px,1px) rotate(-0.1deg); }
    60% { transform: translate(1px,0px) rotate(0.1deg); }
  }
  .shake { animation: shake 0.4s ease; }

  /* topic pills at bottom */
  .topics-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 20px;
    justify-content: center;
  }
  .topic-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.3px;
    transition: all 0.3s;
  }
  .topic-pill.winner {
    background: rgba(255,45,45,0.15);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 10px rgba(255,45,45,0.3);
  }
</style>
</head>
<body>

<div class="machine">
  <div class="top-label">
    <h1>🎰 오늘의 고민 뽑기</h1>
    <p>실전 고민 토크 · 주제 선정기</p>
  </div>

  <div class="slot-body" id="slotBody">
    <div class="slot-window">
      <div class="center-line"></div>
      <div class="reel" id="reel"></div>
    </div>

    <div class="result-area">
      <div class="result-badge" id="resultBadge">
        <div class="result-num" id="resultNum">TODAY'S TOPIC</div>
        <div class="result-text" id="resultText"></div>
      </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">뽑 기 !</button>

    <div class="topics-row" id="topicsRow"></div>
  </div>

  <div class="hint">버튼을 눌러 오늘의 고민 주제를 뽑으세요</div>
</div>

<script>
const TOPICS = [
  '컴퓨터실 딴짓 지도',
  'AI 사용\n어디까지 허용?',
  '수행평가 운영',
  '수준차 큰 학급 운영',
  '모둠활동 관리',
  '정보교과 필요성\n인식시키기',
];

const COLORS = ['#FF2D2D','#FF8C00','#FFD600','#00E676','#00B4FF','#D040FB'];

let spinning = false;
let currentIndex = 0;
let animFrame = null;

const reel = document.getElementById('reel');
const spinBtn = document.getElementById('spinBtn');
const resultBadge = document.getElementById('resultBadge');
const resultText = document.getElementById('resultText');
const slotBody = document.getElementById('slotBody');
const topicsRow = document.getElementById('topicsRow');

// Build reel — repeat topics many times for smooth scrolling
const REPEATS = 8;
const reelItems = [];
for (let r = 0; r < REPEATS; r++) {
  TOPICS.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'reel-item';
    div.textContent = t.replace('\n', ' ');
    div.dataset.idx = i;
    reel.appendChild(div);
    reelItems.push(div);
  });
}

const ITEM_H = 46;
const TOTAL = reelItems.length;
const MID_REPEATS = Math.floor(REPEATS / 2);

// Position reel so item 0 is centered
function setReelPos(itemIndex) {
  const offset = -(itemIndex * ITEM_H) + (120 / 2 - ITEM_H / 2);
  reel.style.transform = `translateY(${offset}px)`;
  highlightCenter(itemIndex);
}

function highlightCenter(itemIndex) {
  reelItems.forEach((el, i) => {
    const isCenter = (i % TOPICS.length) === (itemIndex % TOPICS.length) && 
                     Math.abs(i - itemIndex) <= 1;
    el.classList.toggle('center', i === itemIndex);
  });
}

setReelPos(0);

// Build topic pills
TOPICS.forEach((t, i) => {
  const pill = document.createElement('div');
  pill.className = 'topic-pill';
  pill.id = 'pill-' + i;
  pill.textContent = t.replace('\n', ' ');
  topicsRow.appendChild(pill);
});

function spin() {
  if (spinning) return;
  spinning = true;
  spinBtn.disabled = true;
  slotBody.classList.add('spinning');
  resultBadge.style.display = 'none';
  document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('winner'));

  const winner = Math.floor(Math.random() * TOPICS.length);

  // Total items to scroll through
  const startIdx = currentIndex;
  const extraLaps = 4 + Math.floor(Math.random() * 3); // 4-6 full laps
  const targetIdx = startIdx + (TOPICS.length * extraLaps) + winner;
  // Align to a mid-repeat zone to avoid end-of-list issues
  const safeTarget = MID_REPEATS * TOPICS.length + winner;

  // Phase 1: accelerate
  // Phase 2: hold fast
  // Phase 3: decelerate to stop

  const TOTAL_DURATION = 2800 + Math.random() * 800; // 2.8–3.6s
  const ACCEL_END = 0.18;
  const DECEL_START = 0.68;

  const totalScrollItems = TOPICS.length * extraLaps + (winner - (startIdx % TOPICS.length) + TOPICS.length) % TOPICS.length;
  const totalPx = totalScrollItems * ITEM_H;

  let startTime = null;
  let lastSoundIdx = -1;

  // Sound: tick
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function tick() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = 220 + Math.random() * 80;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.04);
  }
  function winSound() {
    if (!audioCtx) return;
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.4);
    });
  }

  initAudio();

  function easeInOut(t) {
    if (t < ACCEL_END) {
      // ease in
      return (t / ACCEL_END) * (t / ACCEL_END) * 0.3;
    } else if (t < DECEL_START) {
      // linear fast zone
      const midProgress = (t - ACCEL_END) / (DECEL_START - ACCEL_END);
      return 0.3 + midProgress * 0.5;
    } else {
      // ease out (cubic)
      const u = (t - DECEL_START) / (1 - DECEL_START);
      const eased = 1 - Math.pow(1 - u, 3);
      return 0.8 + eased * 0.2;
    }
  }

  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const t = Math.min(elapsed / TOTAL_DURATION, 1);
    const progress = easeInOut(t);

    const scrolled = progress * totalPx;
    const rawIdx = startIdx + scrolled / ITEM_H;
    const itemIdx = Math.round(rawIdx) % TOTAL;
    const offset = -(rawIdx * ITEM_H) + (120 / 2 - ITEM_H / 2);
    reel.style.transform = `translateY(${offset}px)`;
    highlightCenter(Math.round(rawIdx) % TOTAL);

    // tick sound on each item change
    const curItemFloor = Math.floor(rawIdx);
    if (curItemFloor !== lastSoundIdx) {
      lastSoundIdx = curItemFloor;
      // faster ticking in early phase, slower near end
      if (t < 0.85) tick();
    }

    if (t < 1) {
      animFrame = requestAnimationFrame(frame);
    } else {
      // land exactly on winner
      const finalOffset = -(safeTarget * ITEM_H) + (120 / 2 - ITEM_H / 2);
      reel.style.transform = `translateY(${finalOffset}px)`;
      highlightCenter(safeTarget % TOTAL);
      currentIndex = safeTarget;

      spinning = false;
      spinBtn.disabled = false;
      slotBody.classList.remove('spinning');

      // shake
      slotBody.classList.add('shake');
      setTimeout(() => slotBody.classList.remove('shake'), 400);

      // reveal
      setTimeout(() => {
        resultText.textContent = TOPICS[winner].replace('\n', ' ');
        resultBadge.style.display = 'block';
        document.getElementById('pill-' + winner).classList.add('winner');
        winSound();
        launchParticles(COLORS[winner]);
      }, 100);
    }
  }

  animFrame = requestAnimationFrame(frame);
}

function launchParticles(color) {
  const count = 40;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const colors = [color, '#FFD600', '#fff', '#FF2D2D', '#00E676'];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.width = (4 + Math.random() * 8) + 'px';
    p.style.height = (4 + Math.random() * 8) + 'px';
    document.body.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const speed = 150 + Math.random() * 250;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed - 100;
    const rot = Math.random() * 720 - 360;
    const dur = 800 + Math.random() * 600;

    p.animate([
      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${vx}px, ${vy + 200}px) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)', fill: 'forwards' })
    .onfinish = () => p.remove();
  }
}
</script>
</body>
</html>
